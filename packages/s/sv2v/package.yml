name       : sv2v
version    : 0.0.12
release    : 1
source     :
    - https://github.com/zachjs/sv2v/archive/refs/tags/v0.0.12.tar.gz : b64312c995f2d2792fbe610f4a0440259e7e2a9ad9032b37beabf621da51c6da
homepage   : https://github.com/zachjs/sv2v
license    : BSD-3-Clause
networking : yes
component  : programming.tools
summary    : SystemVerilog to Verilog conversion
description: |
    sv2v converts SystemVerilog (IEEE 1800-2017) to Verilog (IEEE 1364-2005), with an emphasis on supporting synthesizable language constructs.
builddeps  :
    - haskell-cabal-install
setup      : |
    # Allow happy > 2
    %patch -p1 -i $pkgfiles/0001-allow_happy_2.patch

    # cabal/ghc-pkg won't recognize binaries installed as build-tool-depends, so we have to install them manually
    # see https://github.com/haskell/cabal/issues/8434 for detailed discussion
    export GHCV=$(ghc --numeric-version)
    cabal update
    cabal v1-install alex
    cabal v1-install happy
    export PATH=~/.cabal/bin:$PATH

    %cabal_configure
build      : |
    %cabal_build
install    : |
    %cabal_install exe:sv2v
